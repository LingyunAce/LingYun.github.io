# Hexo site configuration
# Documentation: https://hexo.io/docs/configuration

# Site
# NOTE: bracketed placeholders below MUST be quoted — otherwise YAML
# parses them as arrays and downstream `.replace()` calls crash.
title: "hulingyun"
subtitle: "独立开发者 / 工程师，欢迎来到我的个人作品集"
description: "记录技术实践、项目经验与日常思考的个人博客"
keywords: [个人博客, 作品集, 技术]
author: "hulingyun"
email: 543491395@qq.com
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://LingyunAce.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ""

# Plugins (loaded in this order)
plugins:
  - hexo-renderer-pug
  - hexo-renderer-stylus
  - hexo-abbrlink
  - hexo-word-counter

# abbrlink
abbrlink:
  alg: crc16
  rep: hex
  auto_space:
  per_posts: true

# Markdown
marked:
  gfm: true
  pedantic: false
  breaks: false

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment
# Repo URL targets the user's actual GitHub Pages repository
deploy:
  type: git
  repo: https://github.com/LingyunAce/LingYun.github.io.git
  branch: gh-pages
  message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Theme
theme: butterfly
