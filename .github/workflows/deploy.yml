name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify butterfly theme is present
        run: |
          if [ ! -d "themes/butterfly" ] || [ ! -f "themes/butterfly/_config.yml" ]; then
            echo "::error::The butterfly theme is missing from themes/butterfly/"
            ls -la themes/ 2>/dev/null || echo "themes/ directory does not exist"
            exit 1
          fi
          echo "✔ butterfly theme found at themes/butterfly/"

      - name: Install dependencies
        run: npm ci

      - name: Clean cache and generate static files
        run: |
          npx hexo clean
          npx hexo generate

      - name: Ensure .nojekyll in output
        run: |
          if [ ! -f .nojekyll ]; then touch .nojekyll; fi
          cp -f .nojekyll public/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"
