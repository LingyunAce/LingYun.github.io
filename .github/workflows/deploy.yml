name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify butterfly theme is present
        run: |
          if [ ! -d "themes/butterfly" ] || [ ! -f "themes/butterfly/_config.yml" ]; then
            echo "::error::The butterfly theme is missing from themes/butterfly/"
            ls -la themes/ 2>/dev/null || echo "themes/ directory does not exist"
            exit 1
          fi
          echo "✔ butterfly theme found at themes/butterfly/"

      - name: Install dependencies
        run: npm ci

      - name: Clean cache and generate static files
        run: |
          npx hexo clean
          npx hexo generate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

